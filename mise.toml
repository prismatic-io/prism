[tools]
"github-cli" = "2.43.1"
bun = "1.3.12"
node = "24"

[tasks.build]
description = "Build the project"
run = "bun run build"

[tasks."format:check"]
description = "Check source file formatting"
run = "bun run check-format"

[tasks.lint]
description = "Lint the source code"
run = "bun run lint"

[tasks.test]
description = "Run tests"
run = "bun run test"

[tasks."test:node20"]
description = "Run tests against Node 20 (minimum supported runtime)"
run = "MISE_NODE_VERSION=20 mise run test"

[tasks."test:node22"]
description = "Run tests against Node 22"
run = "MISE_NODE_VERSION=22 mise run test"

[tasks.validate]
description = "Run all validation checks"
depends = ["format:check", "lint", "build", "test"]

[tasks."validate:node20"]
description = "Run all validation checks against Node 20 (minimum supported runtime)"
run = "MISE_NODE_VERSION=20 mise run validate"

[tasks."validate:node22"]
description = "Run all validation checks against Node 22"
run = "MISE_NODE_VERSION=22 mise run validate"

[tasks."validate:node24"]
description = "Run all validation checks against Node 24"
run = "MISE_NODE_VERSION=24 mise run validate"

[tasks.version-bump]
description = "Bump package.json version (set BUMP_TYPE=patch|minor|major|preview)"
run = """
if [ "$BUMP_TYPE" = "preview" ]; then
  npm version prerelease --preid=preview --no-git-tag-version
else
  npm version $BUMP_TYPE --no-git-tag-version
fi
"""

[tasks.release]
description = "Trigger a release (usage: mise run release -- patch|minor|major|preview)"
usage = '''
arg "<bump>" help="Version bump type" {
  choices "patch" "minor" "major" "preview"
}
'''
run = """
gh workflow run release.yml -f bump="$usage_bump"
echo "Release workflow triggered with bump=$usage_bump"
"""
