version: 2
updates:
  # Roll all non-security version bumps into a single weekly PR. Security
  # updates are not affected by version-update groups and continue to open
  # individually so CVEs stay visible.
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      all-dependencies:
        patterns:
          - "*"
    ignore:
      # Biome bumps require updating the $schema URL in biome.json files,
      # which dependabot doesn't do. Bump manually.
      - dependency-name: "@biomejs/biome"
      # undici 8.x requires Node 22.19+. Pinned to 7.x for >=20 compat.
      - dependency-name: "undici"
      # graphql-codegen v7/v6 majors pull in listr2 10 which requires Node
      # 22.13+. Pinned for >=20 compat.
      - dependency-name: "@graphql-codegen/cli"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@graphql-codegen/typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@graphql-codegen/typescript-operations"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@graphql-codegen/near-operation-file-preset"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      all-actions:
        patterns:
          - "*"
